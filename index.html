        function loadRules() {
            const container = document.getElementById('rulesContainer');
            container.innerHTML = rulesData.map((section, index) => `
                <div class="rules-section">
                    <div class="rules-header" onclick="toggleSection(${index})">
                        <div class="title"><i class="fas fa-skull"></i> ${section.title}</div>
                        <div class="arrow" id="arrow_${index}">▼</div>
                    </div>
                    <div class="rules-body" id="body_${index}">
                        ${section.rules.map(r => `
                            <div class="rule-item">
                                <span class="num">${r.num}</span>
                                <span class="text">${r.text}</span>
                                <span class="badge">${r.badge}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleSection(index) {
            const bod


y = document.getElementById('body_' + index);
            const arrow = document.getElementById('arrow_' + index);
            body.classList.toggle('open');
            arrow.classList.toggle('open');
        }

        // ===== МУЗЫКА =====
        const audio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicToggle');
        let isPlaying = true;

        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                musicBtn.textContent = '🔇';
            } else {
                audio.play().catch(() => {});
                musicBtn.textContent = '🔊';
            }
            isPlaying = !isPlaying;
        });

        document.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(() => {});
                musicBtn.textContent = '🔊';
                isPlaying = true;
            }
        }, { once: true });

        // ===== ЗАГРУЗКА =====
        document.addEventListener('DOMContentLoaded', function() {
            loadRules();
            document.querySelectorAll('.rules-body').forEach((el, i) => {
                if (i === 0) {
                    el.classList.add('open');
                    document.getElementById('arrow_' + i).classList.add('open');
                }
            });
        });
    </script>
